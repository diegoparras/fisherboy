# Promtail tail-ea los logs de los contenedores Docker y los manda a Loki.
# Fisherboy loguea una línea JSON por evento, así que Loki indexa campos directo.
server:
  http_listen_port: 9080

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            job_id: job_id
      - labels:
          level:
          logger:
