# Fisherboy v1 — núcleo liviano. API + worker + Redis.
# Postgres y observabilidad (Prometheus/Loki/Grafana) entran en v3.
#
# La red `escriba_internal` es externa: Fisherboy se enchufa a la constelación
# existente para alcanzar a Anonimal y a Escriba por red interna (regla del pulpo,
# ADR-001). Si todavía no existe, creala con:
#   docker network create escriba_internal

services:
  fisherboy-api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"   # exponé solo en standalone; en sidekick dejalo detrás de la red
    depends_on: [fisherboy-redis]
    networks: [fisherboy, escriba_internal]
    restart: unless-stopped

  fisherboy-worker:
    build: .
    command: python -m app.worker
    env_file: .env
    depends_on: [fisherboy-redis]
    networks: [fisherboy, escriba_internal]
    restart: unless-stopped

  fisherboy-redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    networks: [fisherboy]
    restart: unless-stopped

  # Persistencia opcional (Capa 7). Activar con: docker compose --profile persist up
  # y seteando DATABASE_URL=postgresql://fisherboy:fisherboy@fisherboy-postgres:5432/fisherboy
  fisherboy-postgres:
    image: pgvector/pgvector:pg16
    profiles: [persist]
    environment:
      POSTGRES_USER: fisherboy
      POSTGRES_PASSWORD: fisherboy
      POSTGRES_DB: fisherboy
    volumes:
      - fisherboy_pgdata:/var/lib/postgresql/data
    networks: [fisherboy]
    restart: unless-stopped

volumes:
  fisherboy_pgdata:

networks:
  fisherboy:
  escriba_internal:
    external: true
